<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Календарь</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * { box-sizing: border-box; }
        body { padding: 5px !important; font-size: 14px; margin: 0; }
        .app { height: calc(100vh - 10px); display: flex; flex-direction: column; }
        .app-header { padding: 8px 10px !important; border-radius: 14px; flex-shrink: 0; }
        .app-header h1 { font-size: 1.1rem !important; margin: 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px !important; }
        .user-controls { display: flex; align-items: center; gap: 6px; position: relative; }
        .profile-link { padding: 2px 6px !important; cursor: default; }
        .user-avatar { width: 24px !important; height: 24px !important; }
        .icon-link { width: 30px !important; height: 30px !important; font-size: 1rem !important; }
        .user-name { display: none; }
        .notifications-dropdown { position: relative; }
        .notification-badge { position: absolute; top: -5px; right: -5px; background: var(--holiday); color: white; border-radius: 50%; width: 16px; height: 16px; display: none; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: bold; z-index: 2; }
        .notifications-panel { display: none; position: fixed; top: 55px; right: 8px; width: 300px; max-width: 92vw; max-height: 420px; background: var(--surface); border: 2px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); z-index: 1100; overflow: hidden; }
        .notifications-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.85rem; background: var(--surface); }
        .notifications-header-buttons { display: flex; gap: 8px; }
        .notifications-header-buttons button { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 0.7rem; padding: 2px 4px; }
        .notifications-list { max-height: 350px; overflow-y: auto; }
        .notification-item { position: relative; padding: 12px 36px 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .notification-item.unread { background: rgba(102,126,234,0.1); }
        .notification-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 3px; padding-right: 5px; color: var(--text); }
        .notification-message { font-size: 0.75rem; color: var(--text-secondary); padding-right: 5px; }
        .notification-time { font-size: 0.65rem; color: var(--text-secondary); margin-top: 4px; }
        .notification-delete { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; font-size: 0.8rem; opacity: 0.4; padding: 2px 6px; border-radius: 4px; color: var(--text); z-index: 1; }
        .notification-delete:hover { opacity: 1; background: rgba(245,101,101,0.15); color: var(--holiday); }
        .date-row { display: flex; gap: 4px; margin-bottom: 4px; }
        .date-row select { flex: 1; padding: 8px 4px; font-size: 0.8rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
        .btn-row { display: flex; gap: 4px; }
        .btn-row .btn { flex: 1; padding: 8px; font-size: 0.75rem; border-radius: 6px; text-align: center; }
        .calendar-main { padding: 6px !important; border-radius: 14px; flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
        .view-switcher { display: flex; gap: 3px; margin-bottom: 4px; flex-shrink: 0; }
        .view-btn { flex: 1; padding: 5px; font-size: 0.7rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
        .view-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .calendar-header { flex-shrink: 0; margin-bottom: 2px !important; padding-bottom: 2px !important; }
        .calendar-header h2 { font-size: 0.9rem !important; margin: 0; }
        #monthView { flex: 1; overflow-y: auto; }
        #weekView { flex: 1; overflow-y: auto; display: none; }
        #weekView.active { display: block; }
        .calendar { width: 100%; border-spacing: 1px; }
        .calendar th { padding: 3px 1px; font-size: 0.6rem; position: sticky; top: 0; background: var(--surface); z-index: 1; }
        .calendar td { height: 42px; padding: 1px; }
        .day-cell { padding: 2px; min-height: 38px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; }
        .day-cell.today { border: 2px solid var(--primary); }
        .day-number { font-size: 0.7rem; font-weight: 600; }
        .day-number.holiday { color: var(--holiday); }
        .holiday-name { font-size: 0.4rem; padding: 1px 2px; background: rgba(245,101,101,0.15); border-radius: 2px; color: var(--holiday); }
        .events-container { font-size: 0.45rem; }
        .event-title { padding: 1px 2px; margin: 1px 0; border-radius: 2px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .info-event-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .info-event-item:last-child { border-bottom: none; }
        .info-event-left { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
        .info-event-color { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .info-event-title { font-weight: 500; color: var(--text); font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info-event-edit-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; padding: 2px 6px; color: var(--text-secondary); flex-shrink: 0; }

        .week-list { display: flex; flex-direction: column; gap: 4px; }
        .week-day-card { background: var(--hover); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .week-day-card.today { border: 2px solid var(--primary); }
        .week-day-card-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px; cursor: pointer; }
        .week-day-card-header .day-label { font-size: 0.7rem; color: var(--text-secondary); width: 28px; text-align: center; }
        .week-day-card.today .day-label { color: var(--primary); font-weight: 700; }
        .week-day-card-header .day-date { font-weight: 600; font-size: 0.85rem; }
        .week-day-card.today .day-date { color: var(--primary); }
        .week-day-card-header .day-events-preview { flex: 1; text-align: right; font-size: 0.65rem; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .week-day-card-header .expand-icon { font-size: 0.7rem; color: var(--text-secondary); transition: transform 0.2s; }
        .week-day-card.open .expand-icon { transform: rotate(90deg); }
        .week-day-card-body { display: none; border-top: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .week-day-card.open .week-day-card-body { display: block; }
        .week-day-timeline { display: flex; min-width: 100%; }
        .week-time-labels { width: 35px; flex-shrink: 0; }
        .week-time-label { height: 32px; font-size: 0.5rem; color: var(--text-secondary); text-align: right; padding-right: 4px; line-height: 12px; }
        .week-time-content { flex: 1; position: relative; min-width: 200px; }
        .week-time-slot { height: 32px; border-bottom: 1px solid rgba(128,128,128,0.08); position: relative; cursor: pointer; }
        .week-time-slot:active { background: rgba(102,126,234,0.05); }
        .week-event-block { position: absolute; left: 2px; right: 2px; border-radius: 3px; padding: 1px 4px; font-size: 0.6rem; color: white; overflow: hidden; cursor: pointer; z-index: 1; white-space: nowrap; text-overflow: ellipsis; line-height: 1.5; }
        .week-event-block:active { opacity: 0.8; }
        .mobile-nav { display: flex; justify-content: space-around; background: var(--surface); border-radius: 14px; padding: 5px; margin-top: 5px; box-shadow: var(--shadow); border: 1px solid var(--border); flex-shrink: 0; }
        .mobile-nav a { display: flex; flex-direction: column; align-items: center; gap: 1px; text-decoration: none; color: var(--text-secondary); font-size: 0.6rem; padding: 5px 8px; border-radius: 8px; }
        .mobile-nav a.active { color: var(--primary); background: rgba(102,126,234,0.1); }
        .mobile-nav a .nav-icon { font-size: 1rem; }
        #chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        .chat-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-shrink: 0; }
        .chat-top-bar h3 { margin: 0; font-size: 0.95rem; }
        .create-btn { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; background: var(--primary); color: white; border: none; cursor: pointer; }
        .chat-tabs { display: flex; gap: 2px; margin-bottom: 6px; background: var(--hover); padding: 2px; border-radius: 7px; flex-shrink: 0; }
        .chat-tab { flex: 1; padding: 5px; background: transparent; border: none; font-size: 0.65rem; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-radius: 5px; }
        .chat-tab.active { background: var(--primary); color: white; }
        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
        .chat-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--hover); border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }
        .c-avatar { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--primary); flex-shrink: 0; background: var(--primary); }
        .c-info { flex: 1; overflow: hidden; }
        .c-name { font-weight: 600; color: var(--text); font-size: 0.8rem; display: flex; align-items: center; gap: 4px; }
        .online-dot { width: 6px; height: 6px; border-radius: 50%; background: #48bb78; display: inline-block; }
        .last-seen-text { font-size: 0.55rem; color: var(--text-secondary); margin-top: 1px; }
        .unread-badge { background: var(--primary); color: white; border-radius: 50%; min-width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.6rem; }
        .chat-window { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
        .chat-window.active { display: flex; }
        .cw-header { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid var(--border); margin-bottom: 6px; flex-shrink: 0; }
        .cw-back { font-size: 1.2rem; cursor: pointer; padding: 2px 4px; color: var(--text); }
        .cw-avatar { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--primary); flex-shrink: 0; background: var(--primary); }
        .cw-name { font-weight: 600; font-size: 0.85rem; flex: 1; }
        .cw-status { font-size: 0.6rem; color: var(--text-secondary); }
        .cw-header-actions { display: flex; gap: 2px; margin-left: auto; }
        .cw-header-btn { background: none; border: none; font-size: 1rem; cursor: pointer; padding: 2px 4px; color: var(--text-secondary); }
        .cw-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; padding-right: 3px; min-height: 0; }
        .date-divider { display: flex; align-items: center; justify-content: center; margin: 4px 0; }
        .date-divider span { background: var(--hover); color: var(--text-secondary); padding: 3px 10px; border-radius: 10px; font-size: 0.55rem; font-weight: 500; border: 1px solid var(--border); }
        .msg { display: flex; gap: 5px; max-width: 88%; flex-shrink: 0; }
        .msg.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-ava { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; background: var(--primary); align-self: flex-end; }
        .msg-ava.hidden-ava { visibility: hidden; }
        .msg-body { background: var(--hover); padding: 5px 8px; border-radius: 12px; border: 1px solid var(--border); word-break: break-word; font-size: 0.8rem; }
        .msg.sent .msg-body { background: var(--primary); color: white; border: none; border-radius: 12px 3px 12px 12px; }
        .msg:not(.sent) .msg-body { border-radius: 3px 12px 12px 12px; }
        .msg-sender { font-weight: 600; font-size: 0.65rem; color: var(--primary); margin-bottom: 1px; }
        .msg-text { word-break: break-word; font-size: 0.8rem; line-height: 1.3; }
        .msg-image { max-width: 150px; max-height: 150px; border-radius: 8px; margin-top: 3px; cursor: pointer; display: block; }
        .msg-time { font-size: 0.5rem; color: var(--text-secondary); margin-top: 2px; text-align: right; }
        .msg.sent .msg-time { color: rgba(255,255,255,0.7); }
        .msg-reply-block { font-size: 0.6rem; padding: 3px 6px; background: rgba(0,0,0,0.05); border-radius: 6px; margin-bottom: 3px; border-left: 2px solid var(--primary); cursor: pointer; color: var(--text-secondary); }
        .msg.sent .msg-reply-block { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }
        .msg-reaction-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0px 4px; font-size: 0.6rem; cursor: pointer; display: inline-flex; align-items: center; gap: 2px; margin-right: 2px; }
        .msg-reaction-badge.me { background: rgba(102,126,234,0.12); border-color: var(--primary); }
        .pinned-bar-mobile { padding: 6px 8px; background: rgba(102,126,234,0.1); border-radius: 6px; margin-bottom: 6px; font-size: 0.7rem; border-left: 3px solid var(--primary); display: flex; align-items: center; gap: 6px; }
        .pinned-bar-mobile span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); cursor: pointer; }
        .pinned-bar-mobile .unpin-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 0.9rem; padding: 4px 6px; z-index: 5; position: relative; }
        .reply-preview-mobile { display: flex; align-items: center; gap: 6px; padding: 4px 8px; background: var(--hover); border-radius: 6px; margin-bottom: 4px; font-size: 0.7rem; }
        .reply-preview-mobile span { flex: 1; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .reply-preview-mobile button { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 0.8rem; }
        .cw-input-area { display: flex; gap: 5px; padding-top: 6px; border-top: 1px solid var(--border); margin-top: 6px; flex-shrink: 0; }
        .cw-input-area input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 16px; font-size: 0.8rem; background: var(--surface); color: var(--text); outline: none; }
        .cw-input-area button { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 1rem; cursor: pointer; flex-shrink: 0; }
        .empty-state { text-align: center; color: var(--text-secondary); padding: 20px; font-size: 0.75rem; }
        .context-menu-mobile { display: none; position: fixed; z-index: 2000; background: var(--surface); border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 4px; min-width: 180px; }
        .context-menu-mobile .reaction-row { display: flex; gap: 2px; padding: 4px 6px 6px; border-bottom: 1px solid var(--border); justify-content: center; }
        .context-menu-mobile .reaction-row button { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 3px 5px; border-radius: 50%; }
        .context-menu-item-mobile { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; font-size: 0.8rem; color: var(--text); border-radius: 8px; }
        .context-menu-item-mobile:active { background: var(--hover); }
        .context-menu-item-mobile .cm-icon { font-size: 0.9rem; width: 18px; text-align: center; }
        .context-menu-item-mobile.danger { color: var(--holiday); }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--surface); border-radius: 16px; overflow: hidden; width: 92vw; max-height: 80vh; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .modal-header h3 { font-size: 0.95rem; margin: 0; color: white; }
        .modal-close { background: rgba(255,255,255,0.2); border: none; font-size: 18px; cursor: pointer; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .modal-body { padding: 14px; overflow-y: auto; max-height: calc(80vh - 55px); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; color: var(--text); font-size: 0.8rem; }
        .form-group input[type="text"], .form-group textarea { width: 100%; padding: 8px 10px; border: 2px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 0.85rem; font-family: inherit; }
        .form-group input[type="time"] { width: 100%; padding: 8px 10px; border: 2px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 0.85rem; }
        .time-inputs { display: flex; gap: 6px; align-items: center; }
        .time-inputs input { flex: 1; }
        .shared-list { margin-top: 6px; max-height: 130px; overflow-y: auto; border: 2px solid var(--border); border-radius: 6px; padding: 5px; background: var(--hover); }
        .mem-item { display: flex; align-items: center; gap: 5px; padding: 5px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.75rem; }
        .mem-item img { width: 20px; height: 20px; border-radius: 50%; }
        .group-member-item { display: flex; align-items: center; gap: 8px; padding: 6px; border-bottom: 1px solid var(--border); }
        .group-member-item img { width: 24px; height: 24px; border-radius: 50%; }
        .group-member-item .admin-badge { font-size: 0.6rem; background: var(--primary); color: white; padding: 1px 5px; border-radius: 8px; margin-left: auto; }
        .search-area-mobile { position: relative; margin-bottom: 8px; }
        .search-area-mobile input { width: 100%; padding: 6px 10px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.75rem; background: var(--surface); color: var(--text); }
        .search-results-mobile { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 2px solid var(--border); border-radius: 8px; max-height: 180px; overflow-y: auto; z-index: 100; box-shadow: var(--shadow); display: none; }
        .search-item-mobile { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid var(--border); }
        .btn-small-mobile { padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; border: none; cursor: pointer; background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="version-badge">v3.1</div>
            <div class="header-top"><h1 id="page-title">📅 Календарь</h1>
                <div class="user-controls"><span class="profile-link"><img src="{{ user.get_avatar_url() }}" class="user-avatar" onerror="this.src='/static/uploads/default.png'"></span><div class="notifications-dropdown"><span class="icon-link" onclick="toggleNotifications(event)">🔔</span><span id="notification-badge" class="notification-badge">0</span><div id="notifications-panel" class="notifications-panel" onclick="event.stopPropagation()"></div></div><button class="theme-toggle icon-link" onclick="toggleTheme()">🌙</button><button class="logout-btn icon-link" onclick="logout()">🚪</button></div>
            </div>
            <div class="date-row" id="calendar-controls"><select id="year-select"></select><select id="month-select"><option value="1">Январь</option><option value="2">Февраль</option><option value="3">Март</option><option value="4">Апрель</option><option value="5">Май</option><option value="6">Июнь</option><option value="7">Июль</option><option value="8">Август</option><option value="9">Сентябрь</option><option value="10">Октябрь</option><option value="11">Ноябрь</option><option value="12">Декабрь</option></select></div>
            <div class="btn-row" id="calendar-buttons"><button onclick="loadCurrentView()" class="btn btn-primary">Показать</button><button onclick="goToToday()" class="btn btn-secondary">Сегодня</button></div>
        </header>
        <main class="calendar-main">
            <div id="calendar-view" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;">
                <div class="view-switcher"><button class="view-btn active" onclick="switchView('month')">Месяц</button><button class="view-btn" onclick="switchView('week')">Неделя</button></div>
                <div class="calendar-header"><h2 id="current-month">Загрузка...</h2></div>
                <div id="monthView"><table class="calendar"><thead><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr></thead><tbody id="calendar-body"><tr><td colspan="7" style="text-align:center;padding:15px;">Загрузка...</td></tr></tbody></table></div>
                <div id="weekView"><div class="week-list" id="week-list"></div></div>
            </div>
            <div id="chat-view" style="display:none;">
                <div class="chat-top-bar"><h3>Чаты</h3><button class="create-btn" onclick="openCreateGroupModal()">+ Создать</button></div>
                <div class="search-area-mobile"><input type="text" id="searchInputMobile" placeholder="Поиск..." oninput="searchUsersMobile(this.value)"><div id="searchResultsMobile" class="search-results-mobile"></div></div>
                <div class="chat-tabs"><button class="chat-tab active" onclick="switchChatTab('friends')">Друзья</button><button class="chat-tab" onclick="switchChatTab('groups')">Группы</button><button class="chat-tab" onclick="switchChatTab('requests')">Заявки</button></div>
                <div id="chat-list" class="chat-list"></div>

    <div id="info-modal" class="modal"><div class="modal-content"><div class="modal-header"><h3 id="info-title"></h3><button class="modal-close" onclick="closeInfoModal()">&times;</button></div><div class="modal-body"><div id="holiday-info"></div><div style="padding:8px 10px;margin-bottom:6px;border-radius:8px;background:var(--hover);border:1px solid var(--border);"><h4 style="margin:0 0 4px 0;font-size:0.8rem;">📌 События</h4><div id="events-info"></div></div><div style="padding:8px 10px;margin-bottom:6px;border-radius:8px;background:var(--hover);border:1px solid var(--border);"><h4 style="margin:0 0 4px 0;font-size:0.8rem;">📝 Заметка</h4><div id="comment-info"></div></div><button onclick="openEventModal()" class="btn btn-primary" style="width:100%;margin-bottom:4px;">➕ Добавить событие</button><button onclick="openEditModal()" class="btn btn-primary" style="width:100%;">✏️ Редактировать заметку</button></div></div></div>

    <div id="createGroupModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Создать группу</h3><button class="modal-close" onclick="closeCreateGroupModal()">&times;</button></div><div class="modal-body"><div class="form-group"><label>Название</label><input type="text" id="groupName" placeholder="Название группы"></div><div class="form-group"><label>Участники</label><div id="membersList" class="shared-list"></div></div><button class="btn btn-primary" onclick="createGroup()" style="width:100%;">Создать</button></div></div></div>
    <div id="groupInfoModalMobile" class="modal"><div class="modal-content"><div class="modal-header"><h3>Участники группы</h3><button class="modal-close" onclick="closeGroupInfoModalMobile()">&times;</button></div><div class="modal-body"><div id="groupInfoContentMobile"></div></div></div></div>
    <div id="addMembersModalMobile" class="modal"><div class="modal-content"><div class="modal-header"><h3>➕ Добавить участников</h3><button class="modal-close" onclick="closeAddMembersModalMobile()">&times;</button></div><div class="modal-body"><div class="form-group"><label>Выберите друзей</label><div id="addMembersList" class="shared-list"></div></div><button class="btn btn-primary" onclick="addMembersToGroupMobile()" style="width:100%;">Добавить</button></div></div></div>

    <script>
        var TODAY = "{{ current_year }}-{{ '%02d' % current_month }}-{{ '%02d' % current_day }}";
        var currentYear = {{ current_year }}, currentMonth = {{ current_month }}, currentDay = {{ current_day }};
        var currentTheme = localStorage.getItem('theme') || '{{ user.theme }}' || 'light', currentView = 'month';
        var mobileChat = null, mobileMessages = [], mobileChatInterval = null, chatTab = 'friends', selectedMembers = new Set();
        var selectedDate = null, currentCommentId = null, editingEventId = null, selectedFriends = new Set();
        var addMembersSelectedMobile = new Set(), touchTimer = null, mobilePinnedMsg = null;
        var mobileReplyTo = null, mobileEditingMsg = null;
        var ALL_REACTIONS = ['👍', '👎', '❤️', '😂', '😮', '😢', '😡'];
        var searchTimeoutMobile = null;
        var openDayCard = null;
        function loadTheme() { document.documentElement.setAttribute('data-theme', currentTheme); var btn = document.querySelector('.theme-toggle'); if (btn) btn.textContent = currentTheme === 'light' ? '🌙' : '☀️'; }
        function toggleTheme() { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; localStorage.setItem('theme', currentTheme); loadTheme(); fetch('/update_theme', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ theme: currentTheme }) }); }
        function logout() { if (confirm('Выйти?')) window.location.href = '/logout'; }
        function formatLastSeen(d, gender) {
            if (!d) return '';
            try {
                var n = new Date();
                var s = new Date(d);
                if (isNaN(s.getTime())) return '';
                var diff = Math.floor((n - s) / 1000);
                var wasWord = 'был(а)';
                if (gender === 'male') wasWord = 'был';
                else if (gender === 'female') wasWord = 'была';
                if (diff < 60) return wasWord + ' только что';
                if (diff < 3600) return wasWord + ' ' + Math.floor(diff / 60) + ' мин назад';
                if (diff < 86400) return wasWord + ' ' + Math.floor(diff / 3600) + ' ч назад';
                if (diff < 172800) return wasWord + ' вчера';
                return wasWord + ' ' + s.toLocaleDateString('ru', { day: 'numeric', month: 'long' });
            } catch (e) { return ''; }
        }
        function formatDateDivider(d) { try { var dt = new Date(d); if (isNaN(dt.getTime())) return ''; var n = new Date(); var td = new Date(n.getFullYear(), n.getMonth(), n.getDate()); var yd = new Date(td - 86400000); var md = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()); if (md.getTime() === td.getTime()) return 'Сегодня'; if (md.getTime() === yd.getTime()) return 'Вчера'; return dt.toLocaleDateString('ru', { day: 'numeric', month: 'long' }); } catch (e) { return ''; } }
        function searchUsersMobile(q) { if (searchTimeoutMobile) clearTimeout(searchTimeoutMobile); searchTimeoutMobile = setTimeout(function() { if (q.length < 2) { document.getElementById('searchResultsMobile').style.display = 'none'; return; } fetch('/api/friends/search?q=' + encodeURIComponent(q)).then(function(r) { return r.json(); }).then(function(users) { var div = document.getElementById('searchResultsMobile'); if (users.length) { div.innerHTML = users.map(function(u) { var btn = u.is_friend ? '<span style="color:var(--text-secondary);font-size:0.7rem;">✓ Друг</span>' : '<button class="btn-small-mobile" onclick="sendRequestMobile(' + u.id + ')">Добавить</button>'; return '<div class="search-item-mobile"><div style="display:flex;align-items:center;gap:8px;"><img src="' + (u.avatar || '/static/uploads/default.png') + '" style="width:28px;height:28px;border-radius:50%;"><span>' + u.username + '</span></div>' + btn + '</div>'; }).join(''); } else { div.innerHTML = '<div style="padding:8px;">Ничего не найдено</div>'; } div.style.display = 'block'; }); }, 300); }
        function sendRequestMobile(id) { fetch('/api/friends/send_request', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ friend_id: id }) }).then(function(r) { return r.json(); }).then(function(data) { if (data.success) { alert('Заявка отправлена!'); document.getElementById('searchInputMobile').value = ''; document.getElementById('searchResultsMobile').style.display = 'none'; loadChatList(); } else alert('Ошибка'); }); }
        function toggleNotifications(e) { e.stopPropagation(); var p = document.getElementById('notifications-panel'); if (p.style.display === 'block') p.style.display = 'none'; else { loadNotifications(); p.style.display = 'block'; } }
        function deleteNotification(nid, e) { e.stopPropagation(); fetch('/api/notifications/' + nid + '/delete', { method: 'DELETE' }).then(function() { loadNotifications(); }); }
        function clearAllNotifications(e) { e.stopPropagation(); if (!confirm('Удалить все?')) return; fetch('/api/notifications/clear_all', { method: 'POST' }).then(function() { loadNotifications(); }); }
        function loadNotifications() { fetch('/api/notifications').then(function(r) { return r.json(); }).then(function(data) { var badge = document.getElementById('notification-badge'); badge.textContent = data.unread_count || '0'; badge.style.display = data.unread_count > 0 ? 'flex' : 'none'; var panel = document.getElementById('notifications-panel'); var html = '<div class="notifications-header"><span>Уведомления</span><div class="notifications-header-buttons"><button onclick="markAllRead(event)">Прочитать</button><button onclick="clearAllNotifications(event)" style="color:var(--holiday);">Очистить</button></div></div><div class="notifications-list">'; if (data.notifications.length) { data.notifications.forEach(function(n) { var linkAttr = n.link ? ' onclick="window.location.href=\'' + n.link + '\'" style="cursor:pointer;"' : ''; html += '<div class="notification-item ' + (n.read ? '' : 'unread') + '"><button class="notification-delete" onclick="deleteNotification(' + n.id + ',event)">🗑️</button><div' + linkAttr + '><div class="notification-title">' + (n.title || '') + '</div><div class="notification-message">' + (n.message || '') + '</div><div class="notification-time">' + (n.created_at ? new Date(n.created_at).toLocaleString('ru') : '') + '</div></div></div>'; }); } else { html += '<div style="padding:20px;text-align:center;">Нет уведомлений</div>'; } html += '</div>'; panel.innerHTML = html; }).catch(function() {}); }
        function markAllRead(e) { e.stopPropagation(); fetch('/api/notifications/read_all', { method: 'POST' }).then(function() { loadNotifications(); }); }
        document.addEventListener('click', function(e) { if (!e.target.closest('.notifications-dropdown') && !e.target.closest('.search-area-mobile')) { document.getElementById('notifications-panel').style.display = 'none'; document.getElementById('searchResultsMobile').style.display = 'none'; } });
        function switchPage(p) { document.querySelectorAll('.mobile-nav a').forEach(function(a) { a.classList.remove('active'); }); if (p === 'calendar') { document.querySelectorAll('.mobile-nav a')[0].classList.add('active'); document.getElementById('calendar-view').style.display = 'flex'; document.getElementById('chat-view').style.display = 'none'; document.getElementById('calendar-controls').style.display = 'flex'; document.getElementById('calendar-buttons').style.display = 'flex'; document.getElementById('page-title').textContent = '📅 Календарь'; loadCurrentView(); if (mobileChatInterval) { clearInterval(mobileChatInterval); mobileChatInterval = null; } } else { document.querySelectorAll('.mobile-nav a')[1].classList.add('active'); document.getElementById('calendar-view').style.display = 'none'; document.getElementById('chat-view').style.display = 'flex'; document.getElementById('calendar-controls').style.display = 'none'; document.getElementById('calendar-buttons').style.display = 'none'; document.getElementById('page-title').textContent = '💬 Чаты'; loadChatList(); if (mobileChatInterval) clearInterval(mobileChatInterval); mobileChatInterval = setInterval(loadChatList, 5000); } }
        function switchChatTab(t) { chatTab = t; document.querySelectorAll('.chat-tab').forEach(function(x) { x.classList.remove('active'); }); if (t === 'friends') document.querySelectorAll('.chat-tab')[0].classList.add('active'); else if (t === 'groups') document.querySelectorAll('.chat-tab')[1].classList.add('active'); else document.querySelectorAll('.chat-tab')[2].classList.add('active'); loadChatList(); }
        function loadChatList() { var list = document.getElementById('chat-list'); if (chatTab === 'friends') { fetch('/api/friends/list').then(function(r) { return r.json(); }).then(function(friends) { fetch('/api/messages/unread').then(function(r) { return r.json(); }).then(function(uc) { if (!friends.length) { list.innerHTML = '<div class="empty-state">Нет друзей</div>'; return; } var lastMsgTimes = {}; var promises = friends.map(function(f) { return fetch('/api/messages/' + f.id).then(function(r) { return r.json(); }).then(function(ms) { if (ms.length > 0) lastMsgTimes[f.id] = new Date(ms[ms.length - 1].created_at).getTime(); }).catch(function() {}); }); Promise.all(promises).then(function() { friends.sort(function(a, b) { var au = uc[a.id] || 0, bu = uc[b.id] || 0; if (au > 0 && bu === 0) return -1; if (bu > 0 && au === 0) return 1; var at = lastMsgTimes[a.id] || 0, bt = lastMsgTimes[b.id] || 0; if (at && bt) return bt - at; if (at && !bt) return -1; if (!at && bt) return 1; if (a.online && !b.online) return -1; if (!a.online && b.online) return 1; return a.username.localeCompare(b.username); }); list.innerHTML = friends.map(function(f) { var ac = (mobileChat && mobileChat.type === 'friend' && mobileChat.id === f.id) ? ' active' : ''; var av = f.avatar || '/static/uploads/default.png'; var ub = uc[f.id] ? '<span class="unread-badge">' + uc[f.id] + '</span>' : ''; var ls = f.online ? '' : '<div class="last-seen-text">' + formatLastSeen(f.last_seen, f.gender) + '</div>'; return '<div class="chat-item' + ac + '" onclick="openMobileChat(\'friend\',' + f.id + ',\'' + f.username + '\',\'' + av + '\',' + f.online + ',\'' + (f.last_seen || '') + '\')"><img src="' + av + '" class="c-avatar"><div class="c-info"><div class="c-name">' + f.username + (f.online ? ' <span class="online-dot"></span>' : '') + '</div>' + ls + '</div><div class="c-meta">' + ub + '</div></div>'; }).join(''); }); }); }); } else if (chatTab === 'groups') { fetch('/api/groups/list').then(function(r) { return r.json(); }).then(function(groups) { if (!groups.length) { list.innerHTML = '<div class="empty-state">Нет групп</div>'; return; } list.innerHTML = groups.map(function(g) { var ac = (mobileChat && mobileChat.type === 'group' && mobileChat.id === g.id) ? ' active' : ''; var av = g.avatar || '/static/uploads/group_default.png'; return '<div class="chat-item' + ac + '" onclick="openMobileChat(\'group\',' + g.id + ',\'' + g.name + '\',\'' + av + '\')"><img src="' + av + '" class="c-avatar" style="border-color:var(--success);"><div class="c-info"><div class="c-name">' + g.name + '</div></div></div>'; }).join(''); }); } else { fetch('/api/friends/requests').then(function(r) { return r.json(); }).then(function(requests) { if (!requests.length) { list.innerHTML = '<div class="empty-state">Нет заявок</div>'; return; } list.innerHTML = requests.map(function(r) { var av = r.user.avatar || '/static/uploads/default.png'; return '<div class="chat-item"><img src="' + av + '" class="c-avatar"><div class="c-info"><div class="c-name">' + r.user.username + '</div></div><div style="display:flex;gap:3px;"><button class="btn btn-primary" style="padding:3px 6px;font-size:0.6rem;" onclick="respondRequest(' + r.user.id + ',\'accept\')">✓</button><button class="btn" style="padding:3px 6px;font-size:0.6rem;background:var(--holiday);color:white;" onclick="respondRequest(' + r.user.id + ',\'reject\')">✗</button></div></div>'; }).join(''); }); } }
        function openMobileChat(type, id, name, avatar, online, lastSeen) { mobileChat = { type: type, id: id, name: name, avatar: avatar, online: online, lastSeen: lastSeen }; document.getElementById('chat-list').style.display = 'none'; document.getElementById('chat-window').classList.add('active'); document.getElementById('cw-avatar').src = avatar || '/static/uploads/default.png'; document.getElementById('cw-name').textContent = name; document.getElementById('cw-status').textContent = type === 'friend' ? (online ? '🟢 Онлайн' : '⚫ ' + formatLastSeen(lastSeen, '')) : ''; var actions = document.querySelector('.cw-header-actions'); if (actions) actions.style.display = type === 'group' ? 'flex' : 'none'; cancelReplyMobile(); loadMessages(); if (mobileChatInterval) { clearInterval(mobileChatInterval); mobileChatInterval = null; } mobileChatInterval = setInterval(loadMessages, 3000); }
        function closeMobileChat() { mobileChat = null; document.getElementById('chat-list').style.display = 'flex'; document.getElementById('chat-window').classList.remove('active'); document.getElementById('cw-messages').innerHTML = ''; document.getElementById('pinnedBarMobile').style.display = 'none'; mobilePinnedMsg = null; cancelReplyMobile(); if (mobileChatInterval) { clearInterval(mobileChatInterval); mobileChatInterval = null; } loadChatList(); mobileChatInterval = setInterval(loadChatList, 5000); }
        function loadMessages() { if (!mobileChat) return; var url = mobileChat.type === 'friend' ? '/api/messages/' + mobileChat.id : '/api/groups/' + mobileChat.id + '/messages'; fetch(url).then(function(r) { return r.json(); }).then(function(msgs) { mobileMessages = msgs; var div = document.getElementById('cw-messages'); var wasAtBottom = div.scrollHeight - div.scrollTop - div.clientHeight < 80; var html = '', lastDate = '', lastSenderKey = null; msgs.forEach(function(m) { var msgDate = new Date(m.created_at).toLocaleDateString('ru'); if (msgDate !== lastDate) { lastDate = msgDate; lastSenderKey = null; html += '<div class="date-divider"><span>' + formatDateDivider(m.created_at) + '</span></div>'; } var isSent = m.sender_id == {{ user.id }}; var time = new Date(m.created_at).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }); var currentKey = isSent ? 'me' : m.sender_id; var showAvatar = currentKey !== lastSenderKey; lastSenderKey = currentKey; var avatarUrl = isSent ? '{{ user.get_avatar_url() }}' : (m.sender_avatar || '/static/uploads/default.png'); var avaHtml = showAvatar ? '<img src="' + avatarUrl + '" class="msg-ava" onerror="this.src=\'/static/uploads/default.png\'">' : '<div class="msg-ava hidden-ava"></div>'; var replyHtml = ''; if (m.reply_to) { replyHtml = '<div class="msg-reply-block" onclick="scrollToMsgMobile(' + m.reply_to.id + ')">↩️ ' + (m.reply_to.sender || '') + ': ' + (m.reply_to.text || '').substring(0, 20) + '</div>'; } var senderHtml = (mobileChat.type === 'group' && !isSent) ? '<div class="msg-sender">' + (m.sender_name || '') + '</div>' : ''; var imgHtml = ''; if (m.image_url) { imgHtml = '<img src="' + m.image_url + '" class="msg-image" onclick="viewImageMobile(\'' + m.image_url + '\')" onerror="this.style.display=\'none\'">'; } var reactions = m.reactions || {}; var badgesHtml = ''; if (Object.keys(reactions).length > 0) { badgesHtml = '<div style="display:flex;gap:2px;flex-wrap:wrap;margin-top:2px;">'; for (var e in reactions) { var hasMe = (reactions[e] || []).indexOf({{ user.id }}) !== -1; badgesHtml += '<span class="msg-reaction-badge' + (hasMe ? ' me' : '') + '" onclick="addReactionMobile(' + m.id + ',\'' + e + '\')">' + e + ' ' + reactions[e].length + '</span>'; } badgesHtml += '</div>'; } var timeHtml = '<div class="msg-time">' + time + (isSent ? (m.read ? ' ✓✓' : ' ✓') : '') + (m.edited ? ' (ред.)' : '') + (m.pinned ? ' 📌' : '') + '</div>'; html += '<div class="msg' + (isSent ? ' sent' : '') + '" data-msg-id="' + m.id + '" ontouchstart="msgTouchStart(event,' + m.id + ')" ontouchend="msgTouchEnd(event)">' + avaHtml + '<div class="msg-body">' + replyHtml + senderHtml + '<span class="msg-text">' + (m.text || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span>' + imgHtml + badgesHtml + timeHtml + '</div></div>'; }); div.innerHTML = html; if (wasAtBottom) div.scrollTop = div.scrollHeight; loadPinnedMobile(); }); }
        function viewImageMobile(url) { window.open(url, '_blank'); }
        function scrollToMsgMobile(id) { var el = document.querySelector('[data-msg-id="' + id + '"]'); if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.backgroundColor = 'rgba(102,126,234,0.2)'; setTimeout(function() { el.style.backgroundColor = ''; }, 1500); } }
        function replyToMsgMobile(id) { var m = null; for (var i = 0; i < mobileMessages.length; i++) { if (mobileMessages[i].id === id) { m = mobileMessages[i]; break; } } if (m) { mobileReplyTo = m; mobileEditingMsg = null; document.getElementById('replyPreviewMobileText').textContent = '↩️ ' + (m.sender_name || '') + ': ' + (m.text || '').substring(0, 40); document.getElementById('replyPreviewMobile').style.display = 'flex'; document.getElementById('cw-input').focus(); } }
        function cancelReplyMobile() { mobileReplyTo = null; mobileEditingMsg = null; document.getElementById('replyPreviewMobile').style.display = 'none'; document.getElementById('cw-input').value = ''; }
        function editMsgMobile(id) { var m = null; for (var i = 0; i < mobileMessages.length; i++) { if (mobileMessages[i].id === id) { m = mobileMessages[i]; break; } } if (m) { mobileEditingMsg = m; mobileReplyTo = null; document.getElementById('cw-input').value = m.text || ''; document.getElementById('cw-input').focus(); document.getElementById('replyPreviewMobile').style.display = 'none'; } }
        function msgTouchStart(e, msgId) { touchTimer = setTimeout(function() { showContextMenuMobile(e, msgId); }, 250); }

        function loadCalendar() {

        function loadWeekView() { fetch('/get_week_view/' + currentYear + '/' + currentMonth + '/' + currentDay).then(function(r) { return r.json(); }).then(function(data) { document.getElementById('current-month').textContent = 'Неделя · ' + currentYear; var list = document.getElementById('week-list'); var dayNames = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс']; openDayCard = null; list.innerHTML = data.days.map(function(d) { var isToday = d.date === TODAY; var preview = d.events.length ? d.events.map(function(e) { return e.title; }).join(', ') : 'Нет событий'; var slotsHtml = ''; for (var h = 0; h < 24; h++) { slotsHtml += '<div class="week-time-slot" data-date="' + d.date + '" data-hour="' + h + '" onclick="openEventModal(\'' + d.date + '\')"></div>'; } var timeLabelsHtml = ''; for (var h = 0; h < 24; h++) { timeLabelsHtml += '<div class="week-time-label">' + String(h).padStart(2, '0') + '</div>'; } return '<div class="week-day-card' + (isToday ? ' today' : '') + '" data-date="' + d.date + '"><div class="week-day-card-header" onclick="toggleDayCard(this.parentElement, \'' + d.date + '\')"><span class="day-label">' + dayNames[data.days.indexOf(d)] + '</span><span class="day-date">' + d.day + '</span><span class="day-events-preview">' + preview + '</span><span class="expand-icon">▶</span></div><div class="week-day-card-body"><div class="week-day-timeline"><div class="week-time-labels">' + timeLabelsHtml + '</div><div class="week-time-content" id="timeline-' + d.date + '">' + slotsHtml + '</div></div></div></div>'; }).join(''); setTimeout(function() { data.days.forEach(function(d) { d.events.forEach(function(e) { if (e.has_time && e.start_time) { var sp = e.start_time.split(':'); var sh = parseInt(sp[0]); var sm = parseInt(sp[1]) || 0; var eh = sh + 1; if (e.end_time) { var ep = e.end_time.split(':'); eh = parseInt(ep[0]) + (parseInt(ep[1]) || 0) / 60; } var dur = eh - sh; if (dur < 0.5) dur = 0.5; var slot = document.querySelector('#timeline-' + d.date + ' .week-time-slot[data-hour="' + sh + '"]'); if (slot) { var bar = document.createElement('div'); bar.className = 'week-event-block'; bar.style.background = e.color; bar.style.top = (sm / 60 * 32) + 'px'; bar.style.height = (dur * 32) + 'px'; bar.textContent = e.start_time + ' ' + e.title; bar.onclick = function(ev) { ev.stopPropagation(); openEventModalEdit(e.id); }; slot.appendChild(bar); } } }); }); }, 200); }); }
