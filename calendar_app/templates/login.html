<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--surface); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); border: 1px solid var(--border); }
        .auth-card h2 { text-align: center; margin-bottom: 30px; font-size: 1.8rem; color: var(--text); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; background: var(--surface); color: var(--text); transition: border-color 0.2s; }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .form-group.checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .form-group.checkbox input { width: 18px; height: 18px; accent-color: var(--primary); margin: 0; }
        .form-group.checkbox label { margin: 0; cursor: pointer; font-weight: 400; }
        .btn-primary { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .auth-link { text-align: center; margin-top: 20px; color: var(--text-secondary); font-size: 0.9rem; }
        .auth-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .auth-link a:hover { text-decoration: underline; }
        .error-message { color: var(--holiday); font-size: 0.85rem; margin-top: 4px; display: none; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Вход</h2>
            <form id="loginForm" onsubmit="login(event)">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="username" class="form-input" placeholder="Введите имя" required autocomplete="username">
                    <div class="error-message" id="username-error"></div>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" class="form-input" placeholder="Введите пароль" required autocomplete="current-password">
                    <div class="error-message" id="password-error"></div>
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="remember">
                    <label for="remember">Запомнить меня</label>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Войти</button>
            </form>
            <div class="auth-link">Нет аккаунта? <a href="{{ url_for('register') }}">Создать</a></div>
        </div>
    </div>
        <div class="version-badge">v3.0</div>
    <script>
        async function login(e) {
            e.preventDefault();
            var btn = document.getElementById('loginBtn');
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var remember = document.getElementById('remember').checked;
            document.getElementById('username-error').style.display = 'none';
            document.getElementById('password-error').style.display = 'none';
            if (!username) { document.getElementById('username-error').textContent = 'Введите имя'; document.getElementById('username-error').style.display = 'block'; return; }
            if (!password) { document.getElementById('password-error').textContent = 'Введите пароль'; document.getElementById('password-error').style.display = 'block'; return; }
            btn.disabled = true; btn.textContent = 'Вход...';
            try {
                var res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password, remember: remember })
                });
                var data = await res.json();
                if (data.success) {
                    if (data.theme) document.documentElement.setAttribute('data-theme', data.theme);
                    window.location.href = '/';
                } else {
                    document.getElementById('password-error').textContent = data.error || 'Ошибка входа';
                    document.getElementById('password-error').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('password-error').textContent = 'Ошибка соединения';
                document.getElementById('password-error').style.display = 'block';
            }
            btn.disabled = false; btn.textContent = 'Войти';
        }
    </script>
</body>
</html>
