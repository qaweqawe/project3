<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; margin-bottom: 30px; color: #2d3748; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #4a5568; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #5a67d8; }
        .error { color: #f56565; text-align: center; margin-top: 15px; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #667eea; text-decoration: none; }
        .version-badge {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>📅 Регистрация</h1>
        <form onsubmit="register(event)">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="username" required minlength="3">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Пол</label>
                <select id="gender">
                    <option value="male">👨 Мужской</option>
                    <option value="female">👩 Женский</option>
                    <option value="other" selected>🌟 Другой</option>
                </select>
            </div>
            <div class="form-group">
                <label>Дата рождения</label>
                <input type="date" id="birth_date">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <div class="form-group">
                <label>Подтвердите пароль</label>
                <input type="password" id="confirm_password" required>
            </div>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <div id="error" class="error"></div>
        <p class="link">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </div>
    <div class="version-badge">v2.5-release</div>
    <script>
        async function register(e) {
            e.preventDefault();

            const pwd = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (pwd !== confirm) {
                document.getElementById('error').textContent = 'Пароли не совпадают';
                return;
            }

            const resp = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: pwd,
                    gender: document.getElementById('gender').value,
                    birth_date: document.getElementById('birth_date').value || null
                })
            });

            const data = await resp.json();
            if (data.success) {
                window.location.href = '/';
            } else {
                document.getElementById('error').textContent = data.error;
            }
        }
    </script>
</body>
</html>
