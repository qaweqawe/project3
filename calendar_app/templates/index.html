<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь 2010-2044 | Flask 3.1.3</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>📅 Календарь с заметками</h1>
            <div class="header-controls">
                <div class="date-selector">
                    <select id="year-select" class="modern-select" aria-label="Выберите год"></select>
                    <select id="month-select" class="modern-select" aria-label="Выберите месяц">
                        <option value="1">Январь</option>
                        <option value="2">Февраль</option>
                        <option value="3">Март</option>
                        <option value="4">Апрель</option>
                        <option value="5">Май</option>
                        <option value="6">Июнь</option>
                        <option value="7">Июль</option>
                        <option value="8">Август</option>
                        <option value="9">Сентябрь</option>
                        <option value="10">Октябрь</option>
                        <option value="11">Ноябрь</option>
                        <option value="12">Декабрь</option>
                    </select>
                    <button onclick="loadCalendar()" class="btn btn-primary">Показать</button>
                </div>

                <div class="color-tools">
                    <div class="tool-group">
                        <label for="day-color">Цвет:</label>
                        <input type="color" id="day-color" value="#ff6b6b" class="color-input">
                    </div>
                    <div class="tool-group">
                        <button onclick="applyColorToDays()" class="btn btn-secondary">🎨 Применить</button>
                        <button onclick="clearColors()" class="btn btn-outline">🔄 Очистить</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="calendar-main">
            <div class="calendar-header">
                <h2 id="current-month" class="month-title"></h2>
                <div class="calendar-legend">
                    <span class="legend-item"><span class="legend-color" style="background: #ff6b6b;"></span>Праздник</span>
                    <span class="legend-item"><span class="legend-color" style="background: #4ecdc4;"></span>Памятная дата</span>
                    <span class="legend-item"><span class="legend-color" style="background: #667eea;"></span>Событие</span>
                </div>
            </div>

            <div class="calendar-wrapper">
                <table class="calendar">
                    <thead>
                        <tr>
                            <th>Пн</th>
                            <th>Вт</th>
                            <th>Ср</th>
                            <th>Чт</th>
                            <th>Пт</th>
                            <th class="weekend">Сб</th>
                            <th class="weekend">Вс</th>
                        </tr>
                    </thead>
                    <tbody id="calendar-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Модальное окно -->
    <div id="comment-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-tabs">
                    <button class="tab-btn active" onclick="switchTab('note')">📝 Заметка</button>
                    <button class="tab-btn" onclick="switchTab('event')">📌 Событие</button>
                </div>

                <div id="note-tab" class="tab-content active">
                    <textarea id="comment-text" placeholder="Введите заметку..." rows="6" class="form-input"></textarea>
                    <button onclick="saveComment()" class="btn btn-primary btn-full">💾 Сохранить</button>
                </div>

                <div id="event-tab" class="tab-content">
                    <input type="text" id="event-title" placeholder="Название события" class="form-input">
                    <textarea id="event-description" placeholder="Описание" rows="3" class="form-input"></textarea>
                    <div class="color-selector">
                        <label>Цвет:</label>
                        <div class="color-options">
                            <div class="color-option" style="background: #667eea;" onclick="selectEventColor('#667eea')"></div>
                            <div class="color-option" style="background: #f56565;" onclick="selectEventColor('#f56565')"></div>
                            <div class="color-option" style="background: #48bb78;" onclick="selectEventColor('#48bb78')"></div>
                            <div class="color-option" style="background: #ed8936;" onclick="selectEventColor('#ed8936')"></div>
                        </div>
                        <input type="hidden" id="event-color" value="#667eea">
                    </div>
                    <button onclick="saveEvent()" class="btn btn-primary btn-full">➕ Добавить</button>
                    <div id="events-list" class="events-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
