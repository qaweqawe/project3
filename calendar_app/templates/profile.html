<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Календарь</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        .app { display: flex; flex-direction: column; min-height: 90vh; }
        .calendar-main { padding: 16px 20px !important; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }        .profile-container { width: 100%; max-width: 650px; }
        .profile-card { background: var(--surface); border-radius: 16px; padding: 28px 32px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .profile-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
        .profile-header h2 { color: var(--text); margin: 0; font-size: 1.2rem; }
        .profile-content { display: flex; gap: 28px; align-items: flex-start; }
        .avatar-section { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .avatar-preview { width: 95px; height: 95px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 10px; background: var(--hover); }
        .profile-form { flex: 1; min-width: 0; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 4px; color: var(--text); font-weight: 500; font-size: 0.85rem; }
        .form-group small { display: block; margin-top: 2px; color: var(--text-secondary); font-size: 0.68rem; }
        .form-input { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--surface); color: var(--text); }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .form-input:disabled { background: var(--hover); opacity: 0.7; }
        select.form-input { cursor: pointer; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .version-selector { display: flex; gap: 8px; }
        .version-option { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .version-option:hover { border-color: var(--primary); }
        .version-option.active { border-color: var(--primary); background: rgba(102,126,234,0.1); }
        .version-option .version-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }
        .button-group { display: flex; gap: 10px; margin-top: 16px; }
        .button-group .btn { flex: 1; text-align: center; padding: 10px; font-size: 0.85rem; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; font-weight: 500; font-size: 0.85rem; padding: 8px 14px; }

        .crop-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .crop-modal-content { background: var(--surface); border-radius: 16px; padding: 18px; width: 95vw; max-width: 460px; }
        .crop-container { margin-bottom: 12px; max-height: 300px; overflow: hidden; background: #000; border-radius: 8px; }
        .crop-container img { max-width: 100%; max-height: 300px; }
        .crop-controls { display: flex; gap: 8px; justify-content: center; }
        .crop-controls .btn { flex: 1; max-width: 130px; padding: 8px; font-size: 0.8rem; }
        .cropper-view-box, .cropper-face { border-radius: 50%; }
    </style>
</head>
<body>
    <div class="app">
        <div class="version-badge">v3.1</div>
        <header class="app-header" style="padding: 10px 22px;">
            <div class="header-top" style="margin-bottom: 0;">
                <h1 style="font-size: 1.3rem;">👤 Профиль</h1>
                <div class="user-controls">
                    <a href="{{ url_for('index') }}" class="profile-link"><img src="{{ user.get_avatar_url() }}" alt="{{ user.username }}" class="user-avatar" onerror="this.src='/static/uploads/default.png'"><span class="user-name">{{ user.username }}</span></a>
                    <button class="theme-toggle icon-link" onclick="toggleTheme()">🌙</button>
                    <button class="logout-btn icon-link" onclick="logout()">🚪</button>
                </div>
            </div>
        </header>
        <main class="calendar-main">
            <div class="profile-container">
                <div class="profile-card">
                    <div class="profile-header">
                        <a href="/" class="btn-outline">← Назад</a>
                        <h2>Настройки</h2>
                        <div style="width:62px;"></div>
                    </div>
                    <div class="profile-content">
                        <div class="avatar-section">
                            <img src="{{ user.get_avatar_url() }}" alt="Аватар" id="avatar-preview" class="avatar-preview" onerror="this.src='/static/uploads/default.png'">
                            <label for="avatar-upload" class="btn btn-secondary" style="padding:5px 10px;font-size:0.75rem;cursor:pointer;">Сменить</label>
                            <input type="file" id="avatar-upload" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
                        </div>
                        <form class="profile-form" onsubmit="saveProfile(event)">
                            <div class="form-group">
                                <label>Имя пользователя</label>
                                <input type="text" id="username" value="{{ user.username }}" class="form-input">
                                <small>Можно изменить</small>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" value="{{ user.email }}" disabled class="form-input">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Пол</label>
                                    <select id="gender" class="form-input">
                                        <option value="male" {% if user.gender == 'male' %}selected{% endif %}>Мужской</option>
                                        <option value="female" {% if user.gender == 'female' %}selected{% endif %}>Женский</option>
                                        <option value="other" {% if user.gender == 'other' %}selected{% endif %}>Другой</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Дата рождения</label>
                                    <input type="date" id="birth-date" value="{{ user.birth_date if user.birth_date else '' }}" class="form-input">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Версия интерфейса</label>
                                <div class="version-selector">
                                    <div class="version-option active" data-version="desktop" onclick="selectVersion('desktop')">
                                        <span class="version-icon">💻</span>Десктоп
                                    </div>
                                    <div class="version-option" data-version="mobile" onclick="selectVersion('mobile')">
                                        <span class="version-icon">📱</span>Мобильная
                                    </div>
                                </div>
                                <small>Сохраняется на этом устройстве</small>
                            </div>
                            <div class="button-group">
                                <button type="submit" class="btn btn-primary">Сохранить</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="crop-modal" class="crop-modal">
        <div class="crop-modal-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <h3 style="margin:0;color:var(--text);font-size:1rem;">Обрежьте фото</h3>
                <button onclick="closeCropModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);">&times;</button>
            </div>
            <div class="crop-container"><img id="crop-image"></div>
            <div class="crop-controls">
                <button class="btn btn-secondary" onclick="rotateImage(-90)">Отмена</button>
                <button class="btn btn-primary" onclick="cropImage()">Обрезать</button>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        var currentTheme = localStorage.getItem('theme') || '{{ user.theme }}' || 'light';
        var cropper = null;
        var selectedVersion = localStorage.getItem('app_version') || 'desktop';
        function loadTheme() { document.documentElement.setAttribute('data-theme', currentTheme); document.querySelector('.theme-toggle').textContent = currentTheme === 'light' ? '🌙' : '☀️'; }
        function toggleTheme() { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; localStorage.setItem('theme', currentTheme); loadTheme(); fetch('/update_theme', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({theme:currentTheme})}); }
        function logout() { if(confirm('Выйти?')) window.location.href = '/logout'; }
        function selectVersion(v) { selectedVersion = v; document.querySelectorAll('.version-option').forEach(function(o) { o.classList.toggle('active', o.dataset.version === v); }); }
        function handleFileSelect(e) { var file = e.target.files[0]; if (!file) return; var reader = new FileReader(); reader.onload = function(ev) { document.getElementById('crop-image').src = ev.target.result; document.getElementById('crop-modal').style.display = 'flex'; if (cropper) cropper.destroy(); cropper = new Cropper(document.getElementById('crop-image'), { aspectRatio: 1, viewMode: 1, autoCropArea: 1 }); }; reader.readAsDataURL(file); }
        function closeCropModal() { document.getElementById('crop-modal').style.display = 'none'; if(cropper){cropper.destroy();cropper=null;} document.getElementById('avatar-upload').value=''; }
        function rotateImage(d) { if(cropper) cropper.rotate(d); }
        function cropImage() {
            if (!cropper) return;
            var canvas = cropper.getCroppedCanvas({width:300, height:300});
            canvas.toBlob(function(blob) {
                var fd = new FormData(); fd.append('avatar', blob, 'avatar.jpg');
                fetch('/profile', {method:'POST', body:fd}).then(function(r) { return r.json(); }).then(function(data) {
                    if (data.success) { document.getElementById('avatar-preview').src = data.avatar + '?t=' + Date.now(); closeCropModal(); }
                });
            }, 'image/jpeg', 0.9);
        }
        function saveProfile(e) {
            e.preventDefault();
            var data = { username: document.getElementById('username').value.trim(), gender: document.getElementById('gender').value, birth_date: document.getElementById('birth-date').value || null };
            localStorage.setItem('app_version', selectedVersion);
            fetch('/profile', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}).then(function(r) { return r.json(); }).then(function(result) {
                if (result.success) {
                    alert('✅ Сохранено!');
                    if (selectedVersion === 'mobile') window.location.href = '/?version=mobile';
                    else window.location.href = '/';
                } else { alert('❌ ' + (result.error || 'Ошибка')); }
            });
        }
        document.addEventListener('DOMContentLoaded', function() { loadTheme(); selectVersion(selectedVersion); });
        window.onclick = function(e) { if (e.target.id === 'crop-modal') closeCropModal(); };
    </script>
</body>
</html>
