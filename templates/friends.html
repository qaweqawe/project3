<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Друзья - Календарь</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="header-top">
                <h1>📅 Календарь</h1>
                <div class="user-controls">
                    <a href="{{ url_for('profile') }}" class="profile-link">
                        <img src="{{ user.get_avatar_url() }}" alt="{{ user.username }}" class="user-avatar">
                        <span class="user-name">{{ user.username }}</span>
                    </a>
                    <button class="logout-btn icon-link" onclick="logout()">🚪</button>
                </div>
            </div>
        </header>

        <main class="calendar-main" style="padding:25px;">
            <a href="{{ url_for('index') }}" class="back-link">← Назад к календарю</a>

            <div class="friends-page">
                <h1>👥 Друзья</h1>

                <div class="search-area">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск пользователей...">
                    <div id="searchResults" class="search-results"></div>
                </div>

                <div class="tabs-container">
                    <button class="tab active" onclick="switchTab('friends')">Мои друзья</button>
                    <button class="tab" onclick="switchTab('requests')">
                        Заявки
                        <span id="requestsBadge" class="badge">0</span>
                    </button>
                </div>

                <div id="friendsTab">
                    <div id="friendsList" class="friends-list">
                        <div class="empty-state">Загрузка...</div>
                    </div>
                </div>

                <div id="requestsTab" style="display:none;">
                    <div id="requestsList" class="requests-list">
                        <div class="empty-state">Загрузка...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let searchTimeout = null;
        let currentTheme = localStorage.getItem('theme') || '{{ user.theme }}' || 'light';

        function loadTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
        }

        function logout() { if(confirm('Выйти?')) window.location.href = '/logout'; }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'friends') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('friendsTab').style.display = 'block';
                document.getElementById('requestsTab').style.display = 'none';
                loadFriends();
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('friendsTab').style.display = 'none';
                document.getElementById('requestsTab').style.display = 'block';
                loadRequests();
            }
        }

        async function searchUsers(q) {
            if (q.length < 2) {
                document.getElementById('searchResults').style.display = 'none';
                return;
            }
            const res = await fetch(`/api/friends/search?q=${encodeURIComponent(q)}`);
            const users = await res.json();
            const div = document.getElementById('searchResults');
            div.innerHTML = users.length ? users.map(u => `
                <div class="search-item">
                    <div class="user-info">
                        <img src="${u.avatar}" class="user-avatar">
                        <span>${u.username}</span>
                    </div>
                    <div>${getActionButton(u)}</div>
                </div>
            `).join('') : '<div class="search-item">Ничего не найдено</div>';
            div.style.display = 'block';
        }

        function getActionButton(u) {
            if (u.is_friend) return '<span class="status-badge">✓ Друг</span>';
            if (u.pending_sent) return '<span class="status-badge">⏳ Заявка отправлена</span>';
            if (u.pending_received) return `<button class="btn btn-success" onclick="respondRequest(${u.id}, 'accept')">Принять</button>`;
            return `<button class="btn btn-primary" onclick="sendRequest(${u.id})">Добавить</button>`;
        }

        async function sendRequest(id) {
            const res = await fetch('/api/friends/send_request', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({friend_id:id})});
            const data = await res.json();
            if (data.success) { alert(data.message || 'Заявка отправлена'); document.getElementById('searchInput').value = ''; document.getElementById('searchResults').style.display = 'none'; loadFriends(); loadRequests(); }
            else alert('Ошибка: ' + data.error);
        }

        async function respondRequest(id, action) {
            await fetch('/api/friends/respond', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({from_user_id:id, action})});
            loadFriends(); loadRequests();
        }

        async function removeFriend(id) {
            if (!confirm('Удалить из друзей?')) return;
            await fetch('/api/friends/remove', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({friend_id:id})});
            loadFriends();
        }

        async function loadFriends() {
            const res = await fetch('/api/friends/list');
            const friends = await res.json();
            const div = document.getElementById('friendsList');
            div.innerHTML = friends.length ? friends.map(f => `
                <div class="friend-card">
                    <div class="user-info">
                        <img src="${f.avatar}" class="user-avatar">
                        <span>${f.username}</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-outline" onclick="removeFriend(${f.id})">Удалить</button>
                    </div>
                </div>
            `).join('') : '<div class="empty-state">У вас пока нет друзей</div>';
        }

        async function loadRequests() {
            const res = await fetch('/api/friends/requests');
            const requests = await res.json();
            const div = document.getElementById('requestsList');
            const badge = document.getElementById('requestsBadge');
            badge.textContent = requests.length;
            div.innerHTML = requests.length ? requests.map(r => `
                <div class="friend-card">
                    <div class="user-info">
                        <img src="${r.user.avatar}" class="user-avatar">
                        <span>${r.user.username}</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-success" onclick="respondRequest(${r.user.id}, 'accept')">Принять</button>
                        <button class="btn btn-danger" onclick="respondRequest(${r.user.id}, 'reject')">Отклонить</button>
                    </div>
                </div>
            `).join('') : '<div class="empty-state">Нет входящих заявок</div>';
        }

        document.addEventListener('click', (e) => { if (!e.target.closest('.search-area')) document.getElementById('searchResults').style.display = 'none'; });

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadFriends();
            loadRequests();
            const input = document.getElementById('searchInput');
            input.addEventListener('input', (e) => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => searchUsers(e.target.value), 300); });
            input.addEventListener('focus', () => { if (input.value.length >= 2) searchUsers(input.value); });
        });
    </script>
</body>
</html>
