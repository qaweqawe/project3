<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        <div class="version-badge">v2.0-release</div>
        <header class="app-header">
            <div class="header-top">
                <h1>📅 Календарь</h1>
                <div class="user-controls">
                    <a href="{{ url_for('profile') }}" class="profile-link">
                        <img src="{{ user.get_avatar_url() }}" alt="{{ user.username }}" class="user-avatar">
                        <span class="user-name">{{ user.username }}</span>
                    </a>
                    <a href="{{ url_for('friends_page') }}" class="icon-link" title="Друзья">👥</a>
                    <div class="notifications-dropdown">
                        <span class="icon-link" onclick="toggleNotifications(event)">🔔</span>
                        <span id="notification-badge" class="notification-badge">0</span>
                        <div id="notifications-panel" class="notifications-panel"></div>
                    </div>
                    <button class="theme-toggle icon-link" onclick="toggleTheme()">🌙</button>
                    <button class="logout-btn icon-link" onclick="logout()">🚪</button>
                </div>
            </div>
            <div class="header-controls">
                <div class="date-selector">
                    <select id="year-select"></select>
                    <select id="month-select">
                        <option value="1">Январь</option><option value="2">Февраль</option><option value="3">Март</option>
                        <option value="4">Апрель</option><option value="5">Май</option><option value="6">Июнь</option>
                        <option value="7">Июль</option><option value="8">Август</option><option value="9">Сентябрь</option>
                        <option value="10">Октябрь</option><option value="11">Ноябрь</option><option value="12">Декабрь</option>
                    </select>
                    <button onclick="loadCalendar()" class="btn btn-primary">Показать</button>
                    <button onclick="goToToday()" class="btn btn-secondary">📍 Сегодня</button>
                </div>
                <div class="color-tools">
                    <input type="color" id="day-color" value="#ff6b6b">
                    <button onclick="toggleColorMode()" class="btn btn-secondary" id="colorModeBtn">🎨 Выбрать дни</button>
                    <button onclick="applyColor()" class="btn btn-primary" id="applyColorBtn" style="display:none;">Применить</button>
                    <button onclick="clearColors()" class="btn btn-outline">🗑️ Очистить</button>
                </div>
            </div>
        </header>

        <main class="calendar-main">
            <div class="calendar-header">
                <h2 id="current-month">Загрузка...</h2>
                <div class="calendar-legend">
                    <span><span class="legend-color" style="background:#f56565;"></span>Праздник</span>
                    <span><span class="legend-color" style="background:#48bb78;"></span>Событие</span>
                    <span><span class="legend-color" style="background:#667eea;"></span>Заметка</span>
                </div>
            </div>
            <div class="calendar-wrapper">
                <table class="calendar">
                    <thead><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr></thead>
                    <tbody id="calendar-body"><tr><td colspan="7" style="text-align:center;padding:40px;">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="info-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="info-title"></h3>
                <button class="modal-close" onclick="closeInfoModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="holiday-info"></div>
                <div id="events-info" style="margin-bottom:20px;"></div>
                <div id="comment-info" style="margin-bottom:20px;"></div>
                <button onclick="openEditModal()" class="btn btn-primary" style="width:100%;padding:14px;">✏️ Редактировать</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="edit-title"></h3>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body" style="padding:25px;">
                <div class="tabs" style="margin-bottom:25px;">
                    <button class="tab-btn active" onclick="switchTab('note')">📝 Заметка</button>
                    <button class="tab-btn" onclick="switchTab('event')">📌 Событие</button>
                </div>
                <div id="note-tab" class="tab-content active">
                    <textarea id="comment-text" placeholder="Введите заметку..." rows="5" style="margin-bottom:20px;"></textarea>
                    <div class="button-group">
                        <button onclick="saveComment()" class="btn btn-primary" style="padding:14px;">💾 Сохранить</button>
                        <button onclick="deleteComment()" class="btn btn-outline" id="delete-comment-btn" style="display:none;padding:14px;">🗑️ Удалить</button>
                    </div>
                </div>
                <div id="event-tab" class="tab-content">
                    <input type="text" id="event-title" placeholder="Название события" style="margin-bottom:15px;">
                    <textarea id="event-description" placeholder="Описание (необязательно)" rows="3" style="margin-bottom:15px;"></textarea>
                    <div style="margin-bottom:15px;">
                        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
                            <input type="checkbox" id="share-event"> Поделиться с друзьями
                        </label>
                        <div id="friends-select" style="display:none;margin-top:10px;max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:10px;">
                            <div id="friends-list-select"></div>
                        </div>
                    </div>
                    <div class="button-group">
                        <button onclick="saveEvent()" class="btn btn-primary" id="save-event-btn" style="padding:14px;">➕ Добавить</button>
                        <button onclick="cancelEditEvent()" class="btn btn-outline" id="cancel-edit-btn" style="display:none;padding:14px;">Отмена</button>
                    </div>
                    <div id="events-list" style="margin-top:25px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TODAY = "{{ current_year }}-{{ '%02d' % current_month }}-{{ '%02d' % current_day }}";
        let currentYear = {{ current_year }}, currentMonth = {{ current_month }}, selectedDate = null, colorMode = false, selectedDays = new Set(), currentCommentId = null, editingEventId = null;
        let currentTheme = localStorage.getItem('theme') || '{{ user.theme }}' || 'light';
        let selectedFriends = new Set();

        function loadTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.querySelector('.theme-toggle').textContent = currentTheme === 'light' ? '🌙' : '☀️';
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
            loadTheme();
            fetch('/update_theme', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({theme:currentTheme})});
            loadCalendar();
        }

        function logout() { if(confirm('Выйти?')) window.location.href = '/logout'; }
        function initYearSelect() {
            const s = document.getElementById('year-select');
            for(let y=2010; y<=2044; y++) s.add(new Option(y, y, y==currentYear, y==currentYear));
            document.getElementById('month-select').value = currentMonth;
        }
        function goToToday() { const d = new Date(); currentYear = d.getFullYear(); currentMonth = d.getMonth()+1; document.getElementById('year-select').value = currentYear; document.getElementById('month-select').value = currentMonth; loadCalendar(); }

        async function loadCalendar() {
            currentYear = +document.getElementById('year-select').value;
            currentMonth = +document.getElementById('month-select').value;
            const res = await fetch(`/get_calendar/${currentYear}/${currentMonth}`);
            const data = await res.json();
            document.getElementById('current-month').textContent = `${data.month_name} ${data.year}`;
            renderCalendar(data.calendar);
        }

        function renderCalendar(data) {
            const tbody = document.getElementById('calendar-body');
            tbody.innerHTML = '';
            data.forEach(week => {
                const tr = document.createElement('tr');
                week.forEach(day => {
                    const td = document.createElement('td');
                    if(day.day === '') { td.className = 'empty-day'; td.innerHTML = '<div style="min-height:80px;"></div>'; }
                    else {
                        const div = document.createElement('div');
                        div.className = 'day-cell' + (day.date === TODAY ? ' today' : '');
                        div.setAttribute('data-date', day.date);
                        if(day.color) div.style.backgroundColor = day.color + '26';
                        div.innerHTML = `<div class="day-number${day.is_holiday?' holiday':''}">${day.day}</div>`;
                        if(day.is_holiday && day.holiday_name) div.innerHTML += `<div class="holiday-name">${day.holiday_name}</div>`;
                        if(day.events.length) {
                            const ec = document.createElement('div'); ec.className = 'events-container';
                            day.events.slice(0,3).forEach(e => {
                                const et = document.createElement('div');
                                et.className = 'event-title';
                                et.style.background = e.color;
                                et.textContent = (e.is_shared ? '👥 ' : '') + e.title;
                                ec.appendChild(et);
                            });
                            div.appendChild(ec);
                        }
                        if(day.has_comment) { const f = document.createElement('div'); f.className = 'day-footer'; const i = document.createElement('span'); i.className = 'comment-indicator'; i.style.background = day.comment_color; f.appendChild(i); div.appendChild(f); }
                        div.onclick = (e) => { if(colorMode) { e.currentTarget.classList.toggle('selected'); selectedDays.has(day.date) ? selectedDays.delete(day.date) : selectedDays.add(day.date); } else openInfo(day.date); };
                        td.appendChild(div);
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        async function openInfo(date) {
            selectedDate = date;
            const res = await fetch(`/get_day_info/${date}`);
            const d = await res.json();
            document.getElementById('info-title').textContent = formatDate(date);
            document.getElementById('holiday-info').innerHTML = d.holiday ? `<div class="holiday-block">🎉 ${d.holiday}</div>` : '';
            document.getElementById('events-info').innerHTML = d.events.length ? '<h4 style="margin-bottom:15px;">📌 События</h4>' + d.events.map(e => `<div class="event-item" style="border-left-color:${e.color};padding:15px;margin-bottom:10px;"><b>${e.is_shared?'👥 ':''}${e.title}</b>${e.description?'<br><span style="color:var(--text-secondary);">'+e.description+'</span>':''}</div>`).join('') : '<h4 style="margin-bottom:15px;">📌 События</h4><p style="color:var(--text-secondary);padding:10px;">Нет событий</p>';
            document.getElementById('comment-info').innerHTML = d.comment ? '<h4 style="margin-bottom:15px;">📝 Заметка</h4><div class="event-item" style="border-left-color:'+d.comment.color+';padding:15px;">'+d.comment.text+'</div>' : '<h4 style="margin-bottom:15px;">📝 Заметка</h4><p style="color:var(--text-secondary);padding:10px;">Нет заметок</p>';
            currentCommentId = d.comment?.id;
            document.getElementById('info-modal').style.display = 'block';
        }

        function formatDate(d) { const [y,m,day] = d.split('-'); return `${day} ${['Января','Февраля','Марта','Апреля','Мая','Июня','Июля','Августа','Сентября','Октября','Ноября','Декабря'][+m-1]} ${y}`; }
        function closeInfoModal() { document.getElementById('info-modal').style.display = 'none'; }
        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function openEditModal() {
            closeInfoModal();
            const res = await fetch(`/get_comment/${selectedDate}`);
            const d = await res.json();
            document.getElementById('comment-text').value = d.text || '';
            currentCommentId = d.id;
            document.getElementById('delete-comment-btn').style.display = d.id ? 'block' : 'none';
            document.getElementById('edit-title').textContent = formatDate(selectedDate);
            document.getElementById('edit-modal').style.display = 'block';
            loadEventsList(selectedDate);
            loadFriendsForSelect();
        }

        async function loadFriendsForSelect() {
            const res = await fetch('/api/friends/list');
            const friends = await res.json();
            const div = document.getElementById('friends-list-select');
            div.innerHTML = friends.map(f => `
                <label style="display:flex;align-items:center;gap:10px;padding:8px;cursor:pointer;">
                    <input type="checkbox" value="${f.id}" onchange="toggleFriendSelect(${f.id})">
                    <img src="${f.avatar}" style="width:30px;height:30px;border-radius:50%;">
                    <span>${f.username}</span>
                </label>
            `).join('');
        }

        function toggleFriendSelect(id) {
            selectedFriends.has(id) ? selectedFriends.delete(id) : selectedFriends.add(id);
        }

        document.getElementById('share-event').addEventListener('change', (e) => {
            document.getElementById('friends-select').style.display = e.target.checked ? 'block' : 'none';
        });

        async function saveComment() {
            await fetch('/save_comment', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({date:selectedDate, text:document.getElementById('comment-text').value, color:'#667eea', id:currentCommentId})});
            closeEditModal(); loadCalendar();
        }

        async function deleteComment() {
            if(!confirm('Удалить?')) return;
            await fetch(`/delete_comment/${currentCommentId}`, {method:'DELETE'});
            closeEditModal(); loadCalendar();
        }

        async function saveEvent() {
            const title = document.getElementById('event-title').value;
            if(!title) return alert('Введите название');
            const isShared = document.getElementById('share-event').checked;
            await fetch('/save_event', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({date:selectedDate, title, description:document.getElementById('event-description').value, color:'#48bb78', id:editingEventId, is_shared: isShared, shared_with: Array.from(selectedFriends)})});
            document.getElementById('event-title').value = '';
            document.getElementById('event-description').value = '';
            document.getElementById('share-event').checked = false;
            document.getElementById('friends-select').style.display = 'none';
            selectedFriends.clear();
            editingEventId = null;
            document.getElementById('save-event-btn').textContent = '➕ Добавить';
            document.getElementById('cancel-edit-btn').style.display = 'none';
            loadEventsList(selectedDate);
            loadCalendar();
        }

        function cancelEditEvent() {
            document.getElementById('event-title').value = '';
            document.getElementById('event-description').value = '';
            document.getElementById('share-event').checked = false;
            document.getElementById('friends-select').style.display = 'none';
            selectedFriends.clear();
            editingEventId = null;
            document.getElementById('save-event-btn').textContent = '➕ Добавить';
            document.getElementById('cancel-edit-btn').style.display = 'none';
        }

        async function loadEventsList(date) {
            const res = await fetch(`/get_events/${date}`);
            const events = await res.json();
            document.getElementById('events-list').innerHTML = events.length ? '<h4 style="margin-bottom:15px;">Существующие события:</h4>' + events.map(e => `<div class="event-item" style="display:flex;justify-content:space-between;align-items:center;padding:12px;margin-bottom:8px;"><span><b>${e.is_shared?'👥 ':''}${e.title}</b></span><div><button onclick="editEvent(${e.id})" class="btn-small">✏️</button><button onclick="deleteEvent(${e.id})" class="btn-small">🗑️</button></div></div>`).join('') : '';
        }

        async function editEvent(id) {
            const res = await fetch(`/get_event/${id}`);
            const e = await res.json();
            document.getElementById('event-title').value = e.title;
            document.getElementById('event-description').value = e.description || '';
            document.getElementById('share-event').checked = e.is_shared;
            editingEventId = e.id;
            document.getElementById('save-event-btn').textContent = '💾 Обновить';
            document.getElementById('cancel-edit-btn').style.display = 'block';
            switchTab('event');
        }

        async function deleteEvent(id) { if(confirm('Удалить?')) { await fetch(`/delete_event/${id}`, {method:'DELETE'}); loadEventsList(selectedDate); loadCalendar(); } }
        function toggleColorMode() {
            colorMode = !colorMode;
            document.getElementById('colorModeBtn').textContent = colorMode ? '✅ Выбор' : '🎨 Выбрать дни';
            document.getElementById('applyColorBtn').style.display = colorMode ? 'inline-block' : 'none';
            if(!colorMode) { selectedDays.clear(); document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected')); }
        }
        async function applyColor() {
            if(!selectedDays.size) return alert('Выберите дни');
            await fetch('/set_day_color', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({dates:Array.from(selectedDays), color:document.getElementById('day-color').value})});
            toggleColorMode(); loadCalendar();
        }
        async function clearColors() {
            if(!confirm('Очистить все цвета?')) return;
            const dates = [...document.querySelectorAll('.day-cell')].map(c => c.dataset.date).filter(d => d);
            await fetch('/set_day_color', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({dates, color:''})});
            loadCalendar();
        }
        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab-btn:${t==='note'?'first':'last'}-child`).classList.add('active');
            document.getElementById(`${t}-tab`).classList.add('active');
        }

        async function toggleNotifications(e) {
            e.stopPropagation();
            const panel = document.getElementById('notifications-panel');
            if (panel.style.display === 'none' || !panel.style.display) {
                await loadNotifications();
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
        }

        async function loadNotifications() {
            try {
                const res = await fetch('/api/notifications');
                const data = await res.json();
                const badge = document.getElementById('notification-badge');
                badge.textContent = data.unread_count || '0';
                badge.style.display = data.unread_count > 0 ? 'flex' : 'none';

                const panel = document.getElementById('notifications-panel');
                panel.innerHTML = `
                    <div class="notifications-header"><span>Уведомления</span><button onclick="markAllRead()">Прочитать все</button></div>
                    <div class="notifications-list">
                        ${data.notifications.length ? data.notifications.map(n => `
                            <div class="notification-item ${n.read ? '' : 'unread'}" ${n.link ? `onclick="window.location.href='${n.link}'"` : ''}>
                                <div class="notification-title">${n.title}</div>
                                <div class="notification-message">${n.message}</div>
                                <div class="notification-time">${new Date(n.created_at).toLocaleString('ru')}</div>
                            </div>
                        `).join('') : '<div class="empty-state">Нет уведомлений</div>'}
                    </div>
                `;
            } catch(e) { console.error(e); }
        }

        async function markAllRead() {
            await fetch('/api/notifications/read_all', {method:'POST'});
            loadNotifications();
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.notifications-dropdown')) {
                const panel = document.getElementById('notifications-panel');
                if (panel) panel.style.display = 'none';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            initYearSelect();
            loadCalendar();
            loadTheme();
            loadNotifications();
            setInterval(loadNotifications, 30000);
        });

        window.onclick = (e) => { if(e.target.classList.contains('modal')) { e.target.style.display = 'none'; } };
    </script>
</body>
</html>
