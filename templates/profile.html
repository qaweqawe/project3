<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; margin-bottom: 30px; color: #2d3748; }
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #667eea;
            margin-bottom: 15px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #4a5568; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        .btn-outline {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .button-group { display: flex; gap: 10px; margin-top: 30px; }
        .button-group button, .button-group a { flex: 1; text-align: center; text-decoration: none; }
        .back-link { display: block; margin-bottom: 20px; color: #667eea; text-decoration: none; }
        .version-badge {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Назад</a>
        <h1>Профиль</h1>

        <div class="avatar-section">
            <img src="{{ user.get_avatar_url() }}" alt="Аватар" id="avatar-preview" class="avatar-preview">
            <label for="avatar-upload">
                <span style="padding:8px 16px;background:#e2e8f0;border-radius:8px;cursor:pointer;">📸 Выбрать фото</span>
            </label>
            <input type="file" id="avatar-upload" accept="image/*" style="display:none;" onchange="uploadAvatar(event)">
        </div>

        <form onsubmit="saveProfile(event)">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" value="{{ user.username }}" disabled>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" value="{{ user.email }}" disabled>
            </div>
            <div class="form-group">
                <label>Пол</label>
                <select id="gender">
                    <option value="male" {% if user.gender == 'male' %}selected{% endif %}>👨 Мужской</option>
                    <option value="female" {% if user.gender == 'female' %}selected{% endif %}>👩 Женский</option>
                    <option value="other" {% if user.gender == 'other' %}selected{% endif %}>🌟 Другой</option>
                </select>
            </div>
            <div class="form-group">
                <label>Дата рождения</label>
                <input type="date" id="birth_date" value="{{ user.birth_date if user.birth_date else '' }}">
            </div>

            <div class="button-group">
                <button type="submit">💾 Сохранить</button>
                <a href="/" class="btn-outline">Отмена</a>
            </div>
        </form>
    </div>
    <div class="version-badge">v2.0-release</div>

    <script>
        async function uploadAvatar(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('avatar', file);

            const resp = await fetch('/profile', { method: 'POST', body: formData });
            const data = await resp.json();

            if (data.success) {
                document.getElementById('avatar-preview').src = data.avatar + '?t=' + Date.now();
            }
        }

        async function saveProfile(e) {
            e.preventDefault();

            const resp = await fetch('/profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    gender: document.getElementById('gender').value,
                    birth_date: document.getElementById('birth_date').value || null
                })
            });

            const data = await resp.json();
            if (data.success) {
                alert('Сохранено!');
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
